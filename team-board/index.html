<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>팀 프로젝트 보드 — 서울사계절치과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;background:linear-gradient(145deg,#f5f6f8 0%,#eef2ff 100%);color:#101828;min-height:100vh;-webkit-font-smoothing:antialiased;}
#gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.gate-card{width:100%;max-width:380px;background:#fff;border:1px solid #e8eaed;border-radius:20px;padding:36px 32px 32px;box-shadow:0 12px 40px rgba(16,24,40,.08);}
.gate-logo{font-size:32px;text-align:center;margin-bottom:8px;}
.gate-title{font-size:18px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:4px;}
.gate-sub{font-size:12.5px;color:#667085;text-align:center;margin-bottom:28px;letter-spacing:-.2px;}
.gate-label{display:block;font-size:11.5px;font-weight:700;color:#475467;margin-bottom:7px;letter-spacing:-.2px;}
.gate-input{width:100%;padding:12px 14px;border:1.5px solid #e8eaed;border-radius:11px;font-size:15px;font-family:inherit;letter-spacing:.15em;text-align:center;transition:border-color .15s,box-shadow .15s;}
.gate-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.gate-btn{width:100%;margin-top:14px;padding:13px;background:#101828;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;}
.gate-btn:hover{background:#344054;}.gate-btn:active{transform:scale(.98);}
.gate-err{font-size:12px;color:#f04438;font-weight:600;text-align:center;margin-top:12px;min-height:18px;letter-spacing:-.2px;}
.gate-hint{font-size:11px;color:#98a2b3;text-align:center;margin-top:20px;letter-spacing:-.2px;line-height:1.5;}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">🔒</div>
    <div class="gate-title">팀 프로젝트 보드</div>
    <div class="gate-sub">서울사계절치과 · 리콜 · 보험청구 · EMR</div>
    <label class="gate-label" for="pw">비밀번호</label>
    <input class="gate-input" id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••" maxlength="40"/>
    <button class="gate-btn" id="pw-btn" type="button">입장</button>
    <div class="gate-err" id="pw-err"></div>
    <div class="gate-hint">팀원에게 공유된 비밀번호를 입력하세요.<br>내용은 암호화되어 있어 비밀번호 없이는 열리지 않습니다.</div>
  </div>
</div>

  var KEY='sasa-team-board-enc-v1';
  var input=document.getElementById('pw'), err=document.getElementById('pw-err');
  function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
  async function decrypt(pw){
    var ek=new TextEncoder().encode(pw);
    var bk=await crypto.subtle.importKey('raw',ek,'PBKDF2',false,['deriveKey']);
    var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(P.salt),iterations:P.iter,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);

  function show(html){
    sessionStorage.setItem(KEY,'1');
    document.open();document.write(html);document.close();
  }
  async function tryLogin(){
    var v=input.value.trim();
    if(!v){err.textContent='비밀번호를 입력하세요.';return;}
    err.textContent='여는 중…';
    try{ show(await decrypt(v)); }
    catch(e){ err.textContent='비밀번호가 맞지 않습니다.'; input.select(); }

  document.getElementById('pw-btn').addEventListener('click',tryLogin);
