<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리콜 프로그램 — 무료 다운로드</title>
<meta property="og:title" content="리콜 프로그램 무료 다운로드">
<meta property="og:description" content="미내원 환자 회수 자동화. 무료로 사용하세요.">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f6f8;color:#222;font-family:'Pretendard',system-ui,sans-serif;line-height:1.6}
  .tierbadge{position:fixed;top:10px;left:10px;background:#7a8699;color:#fff;font-weight:800;font-size:12px;padding:5px 11px;border-radius:7px;z-index:99}
  .wrap{max-width:640px;margin:0 auto;padding:60px 22px}
  .top{background:#2563eb;color:#fff;border-radius:10px;padding:30px 24px;text-align:center}
  .top h1{font-size:26px;font-weight:800}
  .top p{font-size:15px;opacity:.9;margin-top:8px}
  .dl{display:inline-block;background:#fff;color:#2563eb;font-weight:800;font-size:16px;padding:13px 28px;border-radius:8px;text-decoration:none;margin-top:18px}
  .deadline{background:#fff3cd;border:1px solid #ffe69c;border-radius:8px;padding:12px;text-align:center;font-size:14px;font-weight:700;color:#7a5800;margin:18px 0}
  .sec{background:#fff;border:1px solid #e3e7ec;border-radius:10px;padding:24px;margin-top:16px}
  .sec h2{font-size:18px;font-weight:800;margin-bottom:12px}
  .sec ul{list-style:none}
  .sec li{padding:8px 0 8px 22px;position:relative;font-size:15px;border-top:1px solid #eef1f4}
  .sec li:first-child{border-top:0}
  .sec li::before{content:"•";position:absolute;left:4px;color:#2563eb;font-weight:800}
  .share{display:block;width:100%;background:#FEE500;color:#191600;font-weight:800;font-size:15px;padding:14px;border-radius:8px;border:0;cursor:pointer;font-family:inherit;margin-top:16px}
  .steps{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .steps .s{flex:1;min-width:120px;background:#f4f6f8;border-radius:8px;padding:12px;text-align:center;font-size:13.5px;font-weight:600}
  .fill{display:inline-block;border:1.5px dashed #b9a05a;background:#fbf6e8;color:#8a6a1f;border-radius:7px;padding:2px 8px;font-size:12.5px;font-weight:650}
  .foot{text-align:center;font-size:12.5px;color:#8893a3;margin-top:24px}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:700;opacity:0;transition:.3s;z-index:90}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="tierbadge">🥉 중수</div>
<div class="wrap">
  <div class="top">
    <h1>리콜 프로그램</h1>
    <p>미내원 환자 회수 자동화 · 덴트웹 연동</p>
    <a class="dl" href="#" id="dl">무료 다운로드</a>
  </div>

  <div class="deadline">⏳ <span class="fill">○월 ○일</span>까지 무료</div>

  <div class="sec">
    <h2>주요 기능</h2>
    <ul>
      <li>미내원 환자를 자동으로 추출해 우선순위로 정렬</li>
      <li>데스크가 1번부터 전화, 결과는 1클릭으로 기록</li>
      <li>덴트웹 차트에 자동 저장</li>
      <li>전화금지로 기록된 환자는 자동 제외</li>
    </ul>
  </div>

  <div class="sec">
    <h2>설치 방법</h2>
    <div class="steps">
      <div class="s">1. 다운로드</div>
      <div class="s">2. 실행·설치</div>
      <div class="s">3. 덴트웹 연결</div>
    </div>
    <button class="share" id="share">카카오톡으로 공유하기</button>
  </div>

  <div class="foot">리콜 프로그램 · 무료로 시작 · 문의 <span class="fill">연락처</span></div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2600);}
document.getElementById('dl').addEventListener('click',function(e){e.preventDefault();toast('정직하고 깔끔. 단 ‘공유할 이유’가 약해서 잘 안 퍼져요.');});
document.getElementById('share').addEventListener('click',()=>toast('공유 버튼은 있지만 누를 동기가 없어요 (중수의 한계).'));
</script>
<!--recall-fab-->
<a href="../index.html" id="recallFab" title="리콜 랜딩페이지 후보 전체 목록 보기"
   style="position:fixed;right:18px;bottom:18px;z-index:2147483000;display:inline-flex;align-items:center;gap:7px;
   background:#1D4ED8;color:#fff;text-decoration:none;font-weight:700;font-size:13px;line-height:1;
   padding:11px 15px;border-radius:999px;box-shadow:0 4px 16px rgba(29,78,216,.35),0 1px 3px rgba(0,0,0,.2);
   font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;
   transition:transform .12s ease,box-shadow .12s ease;opacity:.94;">
  <span style="font-size:15px">📋</span><span>후보 목록</span>
</a>
<style>#recallFab:hover{transform:translateY(-2px);opacity:1;box-shadow:0 8px 24px rgba(29,78,216,.45),0 2px 5px rgba(0,0,0,.25)}
@media print{#recallFab{display:none!important}}</style>
</body>
</html>
